# Relaie le X-Forwarded-Proto envoyé par le reverse-proxy en amont (ex: Synology
# DSM, à configurer pour l'envoyer) ; sinon retombe sur $scheme (http en accès
# direct/local). Évite de forcer "https" en dur, ce qui casserait le CSRF de
# Django en test local (Referer http:// alors que Django croit être en https).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
