server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # NGINX_PORT ne doit jamais être exposé directement sur Internet : ce
        # service n'est censé être atteint que via un reverse-proxy qui a déjà
        # terminé le TLS (ex: Synology DSM). D'où le https en dur, plutôt que
        # $scheme qui vaudrait toujours "http" ici.
        proxy_set_header X-Forwarded-Proto https;
    }
}
