services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${STORAGE_DIR:-.}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - studymed-network

  web:
    image: ghcr.io/camille626/entrainement-medecine:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ${STORAGE_DIR:-.}/data/media:/app/media
      - ${STORAGE_DIR:-.}/data/static:/app/staticfiles
      - ${STORAGE_DIR:-.}/import_init:/app/import_init:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - studymed-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ${STORAGE_DIR:-.}/conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${STORAGE_DIR:-.}/data/media:/app/media:ro
      - ${STORAGE_DIR:-.}/data/static:/app/staticfiles:ro
    depends_on:
      - web
    networks:
      - studymed-network

networks:
  studymed-network:
    driver: bridge
