<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StudyMed{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .nav-tabs .nav-link { color: #495057; font-weight: 500; }
    .nav-tabs .nav-link.active { color: #0d6efd; border-bottom: 2px solid #0d6efd; }
    .nav-tabs .nav-link.disabled { color: #adb5bd; cursor: default; }
    .navbar-brand { font-weight: 700; font-size: 1.1rem; }
    body { background-color: #f8f9fa; }
    .main-content { padding-top: 1.5rem; }
  </style>
</head>
<body>
  <!-- Top navbar -->
  <nav class="navbar navbar-expand navbar-light bg-white border-bottom shadow-sm px-3">
    <a class="navbar-brand text-primary me-4" href="/">📚 StudyMed</a>

    <!-- Navigation tabs -->
    <ul class="nav nav-tabs border-0 flex-grow-1" id="mainNav">
      <li class="nav-item">
        <a class="nav-link {% if request.path == '/' %}active{% endif %}"
           href="/">Accueil</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if '/entrainement' in request.path %}active{% endif %}"
           href="/entrainement/">Entraînement</a>
      </li>
      <li class="nav-item">
        <a class="nav-link disabled" tabindex="-1" aria-disabled="true"
           title="Bientôt disponible" data-bs-toggle="tooltip">Statistiques</a>
      </li>
      <li class="nav-item">
        <a class="nav-link disabled" tabindex="-1" aria-disabled="true"
           title="Bientôt disponible" data-bs-toggle="tooltip">Flashcards</a>
      </li>
      <li class="nav-item">
        <a class="nav-link disabled" tabindex="-1" aria-disabled="true"
           title="Bientôt disponible" data-bs-toggle="tooltip">Historique</a>
      </li>
      {% if user.is_staff %}
      <li class="nav-item">
        <a class="nav-link {% if '/admin' in request.path %}active{% endif %}"
           href="/admin/" id="nav-admin">Admin</a>
      </li>
      {% endif %}
    </ul>

    <!-- Right side: notifications + user -->
    {% if user.is_authenticated %}
    <div class="d-flex align-items-center gap-2 ms-3">
      <!-- Notification bell (placeholder) -->
      <button class="btn btn-sm btn-outline-secondary position-relative" disabled title="Bientôt disponible">
        🔔
      </button>

      <!-- User dropdown -->
      <div class="dropdown">
        <button class="btn btn-sm btn-outline-primary dropdown-toggle d-flex align-items-center gap-1"
                type="button" data-bs-toggle="dropdown" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
               class="bi bi-person-circle" viewBox="0 0 16 16">
            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
          </svg>
          <span class="d-none d-md-inline">{{ user.get_full_name|default:user.username }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow">
          <li><span class="dropdown-item-text text-muted small">{{ user.username }}</span></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item disabled" href="#" title="Bientôt disponible">👤 Profil</a></li>
          <li>
            <form method="post" action="/logout/" class="m-0">
              {% csrf_token %}
              <button type="submit" class="dropdown-item text-danger">🚪 Déconnexion</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
    {% endif %}
  </nav>

  <!-- Page content -->
  <div class="container main-content">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Enable Bootstrap tooltips
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => {
      new bootstrap.Tooltip(el, { placement: 'bottom' });
    });
  </script>
</body>
</html>
