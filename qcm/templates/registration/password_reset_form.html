<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mot de passe oublié — StudyMed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
      <div class="card-body p-4">
        <h1 class="h4 text-center mb-1 fw-bold text-primary">📚 StudyMed</h1>
        <p class="text-center text-muted small mb-4">Réinitialisation du mot de passe</p>

        <p class="text-muted small mb-3">
          Entrez votre adresse email. Si un compte existe, vous recevrez un lien de réinitialisation.
        </p>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_email" class="form-label fw-semibold">Adresse email</label>
            <input type="email" name="email" id="id_email"
                   class="form-control" autofocus required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Envoyer le lien</button>
        </form>

        <div class="text-center mt-3">
          <a href="/login/" class="small text-decoration-none">← Retour à la connexion</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
