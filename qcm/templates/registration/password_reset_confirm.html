{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nouveau mot de passe — StudyMed</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'qcm/img/favicon.svg' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
      <div class="card-body p-4">
        <h1 class="h4 text-center fw-bold text-primary mb-1">📚 StudyMed</h1>
        <p class="text-center text-muted small mb-4">Nouveau mot de passe</p>

        {% if validlink %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_new_password1" class="form-label fw-semibold">Nouveau mot de passe</label>
            <input type="password" name="new_password1" id="id_new_password1"
                   class="form-control" required autocomplete="new-password">
          </div>
          <div class="mb-4">
            <label for="id_new_password2" class="form-label fw-semibold">Confirmer le mot de passe</label>
            <input type="password" name="new_password2" id="id_new_password2"
                   class="form-control" required autocomplete="new-password">
          </div>
          {% if form.errors %}
          <div class="alert alert-danger small py-2">{{ form.errors }}</div>
          {% endif %}
          <button type="submit" class="btn btn-primary w-100">Enregistrer le mot de passe</button>
        </form>
        {% else %}
        <div class="alert alert-danger">
          Le lien de réinitialisation est invalide ou a expiré (24h).
          <a href="/password_reset/" class="alert-link">Faire une nouvelle demande</a>.
        </div>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
