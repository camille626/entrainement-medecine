{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — StudyMed</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'qcm/img/favicon.svg' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
      <div class="card-body p-4">
        <h1 class="h4 text-center mb-1 fw-bold text-primary">📚 StudyMed</h1>
        <p class="text-center text-muted small mb-4">Plateforme de QCMs P2</p>

        {% if form.errors %}
        <div class="alert alert-danger py-2 small">
          Identifiants incorrects. Veuillez réessayer.
        </div>
        {% endif %}

        {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
        {% endif %}

        <form method="post" action="/login/">
          {% csrf_token %}
          {% if next %}
          <input type="hidden" name="next" value="{{ next }}">
          {% endif %}

          <div class="mb-3">
            <label for="id_username" class="form-label fw-semibold">Identifiant</label>
            <input type="text" name="username" id="id_username"
                   class="form-control" autofocus autocomplete="username" required>
          </div>

          <div class="mb-4">
            <label for="id_password" class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" id="id_password"
                   class="form-control" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>

        <div class="text-center mt-2">
          <a href="/password_reset/" class="small text-decoration-none text-muted">
            Mot de passe oublié ?
          </a>
        </div>

        <hr class="my-3">
        <p class="text-center small text-muted mb-0">
          Pas encore de compte ?
          <a href="/inscription/" class="text-decoration-none">Demander l'accès</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
